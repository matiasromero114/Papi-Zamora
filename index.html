<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>GMP · Tablero de Mantenimiento de Frío</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg-page: #f0f2f5;
      --color-bg-card: #ffffff;
      --color-text-primary: #1e2a3a;
      --color-text-secondary: #4a5568;
      --color-text-muted: #718096;
      --color-border: #e2e8f0;
      --color-border-strong: #cbd5e0;
      --color-ok: #2c7a4d;
      --color-danger: #c53030;
      --color-warning: #c05621;
      --color-coiron: #2b6cb0;
      --color-viejo: #9c4221;
      --color-accent: #3182ce;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-page: #0f172a;
        --color-bg-card: #1e293b;
        --color-text-primary: #f1f5f9;
        --color-text-secondary: #cbd5e1;
        --color-text-muted: #94a3b8;
        --color-border: #334155;
        --color-border-strong: #475569;
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg-page);
      color: var(--color-text-primary);
      font-size: 14px;
      line-height: 1.4;
    }

    /* Layout */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: #0c2340;
      color: white;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: rgba(55,138,221,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon i { font-size: 24px; color: #85b7eb; }
    .title h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.2px; }
    .title p { font-size: 11px; opacity: 0.6; margin-top: 2px; }
    .header-actions { margin-left: auto; display: flex; gap: 12px; align-items: center; }
    .live-badge {
      background: rgba(29,158,117,0.15);
      border: 1px solid rgba(29,158,117,0.4);
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #5dcaa5;
    }
    .live-dot { width: 8px; height: 8px; background: #5dcaa5; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .btn-refresh {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 30px;
      padding: 5px 14px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .btn-refresh:hover { background: rgba(255,255,255,0.2); }

    /* Navegación por pestañas */
    .tabs {
      display: flex;
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      padding: 0 20px;
      gap: 4px;
      overflow-x: auto;
    }
    .tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--color-text-secondary);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tab i { font-size: 16px; }
    .tab.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }
    .tab .badge {
      background: var(--color-bg-page);
      padding: 2px 8px;
      border-radius: 30px;
      font-size: 11px;
    }
    .tab.active .badge { background: #e8f0fe; color: #0c447c; }

    /* Contenido principal */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .pane { display: none; }
    .pane.active { display: block; }

    /* Tarjetas KPI */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 16px;
      transition: 0.1s;
    }
    .kpi-card.accent-blue { border-top: 3px solid #2b6cb0; }
    .kpi-card.accent-green { border-top: 3px solid #2c7a4d; }
    .kpi-card.accent-red { border-top: 3px solid #c53030; }
    .kpi-card.accent-amber { border-top: 3px solid #c05621; }
    .kpi-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-muted);
      margin-bottom: 8px;
    }
    .kpi-value {
      font-size: 28px;
      font-weight: 600;
      line-height: 1.2;
    }
    .kpi-unit { font-size: 14px; font-weight: normal; color: var(--color-text-muted); }
    .kpi-sub { font-size: 11px; color: var(--color-text-muted); margin-top: 6px; }

    /* Tablas profesionales */
    .table-wrapper {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      font-weight: 600;
      color: var(--color-text-secondary);
      white-space: nowrap;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
      vertical-align: middle;
    }
    tr:hover td { background: var(--color-bg-page); }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .status-operativa { background: #e6f4ea; color: #2c7a4d; }
    .status-fuera { background: #fce8e6; color: #c53030; }
    .type-badge {
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 500;
    }
    .type-coiron { background: #e8f0fe; color: #2b6cb0; }
    .type-viejo { background: #faedea; color: #9c4221; }
    .clickable-row { cursor: pointer; }
    .search-box {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 8px 12px 8px 36px;
      border: 1px solid var(--color-border);
      border-radius: 30px;
      background: var(--color-bg-card);
      color: var(--color-text-primary);
      font-size: 13px;
    }
    .search-icon { position: relative; }
    .search-icon i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted); }

    /* Alertas */
    .alert-section {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .alert-header {
      padding: 12px 16px;
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-tag { font-size: 11px; font-weight: 500; min-width: 70px; }
    .alert-desc { flex: 1; }
    .alert-title { font-weight: 500; }
    .alert-code { font-family: monospace; font-size: 11px; color: var(--color-text-muted); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-container {
      background: var(--color-bg-card);
      border-radius: 16px;
      max-width: 800px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
    }
    .modal-header {
      background: #0c2340;
      color: white;
      padding: 16px 20px;
      position: sticky;
      top: 0;
    }
    .modal-close {
      float: right;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 8px;
      padding: 4px 12px;
      color: white;
      cursor: pointer;
    }
    .modal-body { padding: 20px; }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .detail-item {
      background: var(--color-bg-page);
      padding: 10px;
      border-radius: 10px;
    }
    .detail-label { font-size: 10px; text-transform: uppercase; color: var(--color-text-muted); }
    .detail-value { font-weight: 500; margin-top: 4px; }
    .interv-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      gap: 12px;
    }
    .interv-date { min-width: 90px; font-size: 12px; }
    .interv-desc { flex: 1; font-size: 12px; }
    .interv-cost { font-weight: 500; color: var(--color-accent); }
    .empty-state { padding: 40px; text-align: center; color: var(--color-text-muted); }
    .spinner { width: 30px; height: 30px; border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--color-accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

</div>

</div>

    document.getElementById('mainContent').innerHTML = `<div class="spinner"></div>`;
    try {
      let registroCSV = EMBEDDED_REGISTRO;
      let mantenimientoCSV = EMBEDDED_MANTENIMIENTO;
      if (CSV_REGISTRO_URL && CSV_MANTENIMIENTO_URL) {
        const [regResp, manResp] = await Promise.all([
          fetch(CSV_REGISTRO_URL).then(r => r.text()),
          fetch(CSV_MANTENIMIENTO_URL).then(r => r.text())
        ]);
        registroCSV = regResp;
        mantenimientoCSV = manResp;
      }
      const registros = Papa.parse(registroCSV, { header: true, skipEmptyLines: true }).data;
      const mantenimientos = Papa.parse(mantenimientoCSV, { header: true, skipEmptyLines: true }).data;

      const equiposMap = new Map();
      for (const row of registros) {
        const codigo = (row['Codigo de equipo'] || '').trim();
        if (!codigo) continue;
        let unidad = (row['Agricola'] || '').trim();
        if (unidad.includes('EDT')) unidad = 'EDT';
        else if (unidad.includes('TDA - EMPAQUE')) unidad = 'TDA - EMPAQUE';
        else if (unidad.includes('MARGESI')) unidad = 'MARGESI';
        else if (unidad.includes('TDB')) unidad = 'TDB';
        else unidad = 'OTROS';
        const tipo = (row['COIRON o Eq Viejo'] || '').trim() === 'COIRON' ? 'COIRON' : 'EQ VIEJO';
        const estado = (row['Estado Actual'] || '').trim();
        const ultFecha = row['Ult fecha de mant'] ? formatearFecha(row['Ult fecha de mant']) : '';
        equiposMap.set(codigo, {
          codigo, sector: (row['Sector'] || '').trim(),
          descripcion: (row['Descripcion'] || '').trim(),
          gas: (row['Gas'] || '').trim(),
          tipo, estado, ultFecha,
          observaciones: (row['Observaciones'] || '').trim(),
          unidad, intervenciones: []
        });
      }
      for (const row of mantenimientos) {
        const codigo = (row['Codigo de equipo'] || '').trim();
        if (!codigo || !equiposMap.has(codigo)) continue;
        const fecha = row['Fecha del mant'] ? formatearFecha(row['Fecha del mant']) : '';
        let presupuesto = row['Presupuesto USD'] || '';
        if (presupuesto && !isNaN(parseFloat(presupuesto))) presupuesto = `$${parseFloat(presupuesto).toLocaleString()}`;
        equiposMap.get(codigo).intervenciones.push({
          fecha, desc: (row['Descripcion del Mantenimiento'] || '').trim(),
          estado: (row['Estado del trabajo'] || '').trim(),
          orden: (row['N°: Recep/Orden de compra'] || '').trim(),
          presupuesto, obs: (row['Observaciones'] || '').trim()
        });
      }
      for (let eq of equiposMap.values()) {
        eq.intervenciones.sort((a,b) => (b.fecha || '').localeCompare(a.fecha || ''));
        if (!eq.ultFecha && eq.intervenciones.length && eq.intervenciones[0].fecha) eq.ultFecha = eq.intervenciones[0].fecha;
      }
      const DB = { EDT: [], 'TDA - EMPAQUE': [], MARGESI: [], TDB: [] };
      for (let eq of equiposMap.values()) if (DB[eq.unidad]) DB[eq.unidad].push(eq);
      let totalEquipos = 0, totalOperativos = 0, totalCOIRON = 0, totalPresupuesto = 0;
      const trabajosNoIniciados = [], equiposSinRegistro = [];
      for (let eq of equiposMap.values()) {
        totalEquipos++;
        if (eq.estado === 'Operativa') totalOperativos++;
        if (eq.tipo === 'COIRON') totalCOIRON++;
        eq.intervenciones.forEach(int => {
          const monto = parseFloat(String(int.presupuesto).replace(/[^0-9.-]/g, ''));
          if (!isNaN(monto) && int.estado === 'Finalizado') totalPresupuesto += monto;
          if (int.estado === 'No iniciado') trabajosNoIniciados.push({ unidad: eq.unidad, sector: eq.sector, codigo: eq.codigo, desc: int.desc });
        });
        if (!eq.ultFecha && eq.intervenciones.length === 0) equiposSinRegistro.push({ unidad: eq.unidad, sector: eq.sector, codigo: eq.codigo, obs: eq.observaciones });
      }
      fullData = { DB, stats: { totalEquipos, totalOperativos, totalCOIRON, totalViejos: totalEquipos - totalCOIRON, totalPresupuesto, trabajosNoIniciados, equiposSinRegistro } };
      renderTabs();
      renderResumen();
      document.getElementById('lastUpdate').innerText = `Actualizado ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error(err);
      document.getElementById('mainContent').innerHTML = `<div class="empty-state">Error cargando datos: ${err.message}<br><button class="btn-refresh" onclick="cargarDatos()">Reintentar</button></div>`;
    }
  }

  function formatearFecha(f) {
    if (!f) return '';
    let p = f.split('/');
    if (p.length === 3 && p[0].length === 4) return `${p[2]}/${p[1]}/${p[0]}`;
    return f;
  }

  function renderTabs() {
    const units = Object.keys(fullData.DB).filter(u => fullData.DB[u].length);
    const tabsHtml = units.map(u => {
      let label = u === 'TDA - EMPAQUE' ? 'TDA Empaque' : u;
      return `<div class="tab" data-unit="${u}"><i class="ti ti-${u === 'EDT' ? 'building' : (u === 'TDA - EMPAQUE' ? 'building-store' : 'map-pin')}"></i>${label} <span class="badge">${fullData.DB[u].length}</span></div>`;
    }).join('');
    document.getElementById('tabsContainer').innerHTML = `<div class="tab active" data-unit="resumen"><i class="ti ti-chart-bar"></i>Resumen <span class="badge">${fullData.stats.totalEquipos}</span></div>${tabsHtml}`;
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentUnit = tab.dataset.unit;
        if (currentUnit === 'resumen') renderResumen();
        else renderUnitTable(currentUnit);
      });
    });
  }

  function renderResumen() {
    const { stats, DB } = fullData;
    const html = `
      <div class="kpi-grid">
        <div class="kpi-card accent-blue"><div class="kpi-label">Flota total</div><div class="kpi-value">${stats.totalEquipos}<span class="kpi-unit"> eq</span></div><div class="kpi-sub">4 unidades</div></div>
        <div class="kpi-card accent-green"><div class="kpi-label">Operativos</div><div class="kpi-value">${stats.totalOperativos}<span class="kpi-unit"> eq</span></div><div class="kpi-sub">${Math.round(stats.totalOperativos/stats.totalEquipos*100)}% de flota</div></div>
        <div class="kpi-card accent-red"><div class="kpi-label">Fuera servicio</div><div class="kpi-value">${stats.totalEquipos - stats.totalOperativos}<span class="kpi-unit"> eq</span></div></div>
        <div class="kpi-card accent-amber"><div class="kpi-label">COIRON</div><div class="kpi-value">${stats.totalCOIRON}<span class="kpi-unit"> eq</span></div><div class="kpi-sub">${Math.round(stats.totalCOIRON/stats.totalEquipos*100)}%</div></div>
        <div class="kpi-card"><div class="kpi-label">Equipos viejos</div><div class="kpi-value">${stats.totalViejos}<span class="kpi-unit"> eq</span></div></div>
        <div class="kpi-card accent-blue"><div class="kpi-label">Presupuesto USD</div><div class="kpi-value">$${stats.totalPresupuesto.toLocaleString()}</div></div>
      </div>
      <div class="alert-section"><div class="alert-header"><i class="ti ti-alert-triangle"></i> Trabajos no iniciados (${stats.trabajosNoIniciados.length})</div>
        ${stats.trabajosNoIniciados.length ? stats.trabajosNoIniciados.map(p => `
          <div class="alert-item"><div class="alert-tag"><span class="type-badge type-viejo">${p.unidad}</span></div>
          <div class="alert-desc"><div class="alert-title">${escapeHtml(p.sector)}</div><div class="alert-code">${p.codigo}</div><div>${escapeHtml(p.desc)}</div></div></div>`).join('') : '<div class="empty-state">Sin trabajos pendientes</div>'}
      </div>
      <div class="alert-section"><div class="alert-header"><i class="ti ti-clock-exclamation"></i> Equipos sin registro de mantenimiento (${stats.equiposSinRegistro.length})</div>
        ${stats.equiposSinRegistro.length ? stats.equiposSinRegistro.map(s => `
          <div class="alert-item"><div class="alert-tag"><span class="type-badge type-viejo">${s.unidad}</span></div>
          <div class="alert-desc"><div class="alert-title">${escapeHtml(s.sector)}</div><div class="alert-code">${s.codigo}</div>${s.obs ? `<div class="alert-code">${escapeHtml(s.obs)}</div>` : ''}</div></div>`).join('') : '<div class="empty-state">Todos los equipos tienen registro</div>'}
      </div>
    `;
    document.getElementById('mainContent').innerHTML = html;
  }

  function renderUnitTable(unit) {
    const equipos = fullData.DB[unit] || [];
    const tableHtml = `
      <div class="search-box search-icon"><i class="ti ti-search"></i><input type="text" id="searchInput" class="search-input" placeholder="Buscar por sector, código o descripción..." style="padding-left:36px;"></div>
      <div class="table-wrapper"><table id="unitTable">
        <thead><tr><th>Sector</th><th>Código</th><th>Descripción</th><th>Gas</th><th>Estado</th><th>Tipo</th><th>Últ. mantenimiento</th></tr></thead>
        <tbody id="tableBody"></tbody></table></div>`;
    document.getElementById('mainContent').innerHTML = tableHtml;
    renderTableBody(equipos);
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = equipos.filter(eq => [eq.sector, eq.codigo, eq.descripcion].join(' ').toLowerCase().includes(term));
      renderTableBody(filtered);
    });
  }

  function renderTableBody(equipos) {
    const tbody = document.getElementById('tableBody');
    if (!tbody) return;
    tbody.innerHTML = equipos.map(eq => `
      <tr class="clickable-row" onclick="openModal('${eq.unidad}', '${eq.codigo}')">
        <td>${escapeHtml(eq.sector)}</td><td style="font-family:monospace; font-size:12px;">${eq.codigo}</td>
        <td>${escapeHtml(eq.descripcion.substring(0, 60))}${eq.descripcion.length > 60 ? '…' : ''}</td>
        <td>${eq.gas || '—'}</td>
        <td><span class="status-badge ${eq.estado === 'Operativa' ? 'status-operativa' : 'status-fuera'}">${eq.estado}</span></td>
        <td><span class="type-badge ${eq.tipo === 'COIRON' ? 'type-coiron' : 'type-viejo'}">${eq.tipo}</span></td>
        <td>${eq.ultFecha || '—'}</td>
      </tr>
    `).join('');
  }

  window.openModal = function(unidad, codigo) {
    const eq = fullData.DB[unidad].find(e => e.codigo === codigo);
    if (!eq) return;
    document.getElementById('modalTitle').innerHTML = `<div><strong>${escapeHtml(eq.sector)}</strong><br><span style="font-size:12px; opacity:0.8;">${eq.codigo}</span></div>`;
    const presupuestos = eq.intervenciones.filter(i => i.presupuesto && i.presupuesto !== '$0').map(i => i.presupuesto);
    const intHtml = eq.intervenciones.length ? eq.intervenciones.map(i => `
      <div class="interv-item"><div class="interv-date">${i.fecha || 'Pendiente'}<br><span class="type-badge ${i.estado === 'Finalizado' ? 'type-coiron' : (i.estado === 'No iniciado' ? 'status-fuera' : 'status-operativa')}" style="margin-top:4px; display:inline-block;">${i.estado}</span></div>
      <div class="interv-desc">${escapeHtml(i.desc)}${i.obs ? `<div style="margin-top:5px; font-size:11px; color:var(--color-text-muted);">Obs: ${escapeHtml(i.obs)}</div>` : ''}${i.orden ? `<div style="margin-top:3px; font-size:10px;">Orden: ${i.orden}</div>` : ''}</div>
      <div class="interv-cost">${i.presupuesto || '—'}</div></div>`).join('') : '<div class="empty-state">Sin intervenciones registradas</div>';
    document.getElementById('modalBody').innerHTML = `
      <div class="detail-grid"><div class="detail-item"><div class="detail-label">Gas</div><div class="detail-value">${eq.gas || '—'}</div></div>
      <div class="detail-item"><div class="detail-label">Estado</div><div class="detail-value"><span class="status-badge ${eq.estado === 'Operativa' ? 'status-operativa' : 'status-fuera'}">${eq.estado}</span></div></div>
      <div class="detail-item"><div class="detail-label">Tipo</div><div class="detail-value"><span class="type-badge ${eq.tipo === 'COIRON' ? 'type-coiron' : 'type-viejo'}">${eq.tipo}</span></div></div>
      <div class="detail-item"><div class="detail-label">Último mantenimiento</div><div class="detail-value">${eq.ultFecha || 'Sin registro'}</div></div>
      <div class="detail-item"><div class="detail-label">Intervenciones</div><div class="detail-value">${eq.intervenciones.length}</div></div>
      <div class="detail-item"><div class="detail-label">Presupuesto total</div><div class="detail-value">${presupuestos.length ? presupuestos.join(' + ') : 'No registrado'}</div></div></div>
      <div class="detail-item" style="margin-bottom:12px;"><div class="detail-label">Descripción técnica</div><div class="detail-value">${escapeHtml(eq.descripcion)}</div></div>
      ${eq.observaciones ? `<div class="detail-item" style="margin-bottom:12px;"><div class="detail-label">Observaciones actuales</div><div class="detail-value" style="color:var(--color-danger);">${escapeHtml(eq.observaciones)}</div></div>` : ''}
      <div class="detail-label" style="margin:12px 0 8px;"><i class="ti ti-history"></i> Historial de intervenciones</div>
      ${intHtml}
    `;
    document.getElementById('modalOverlay').classList.add('active');
  };
  window.closeModal = function(e) { if (!e || e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('active'); };
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  document.getElementById('refreshBtn').addEventListener('click', () => cargarDatos());
  cargarDatos();
  setInterval(() => cargarDatos(), 60000);
</script>
</body>
</html>
