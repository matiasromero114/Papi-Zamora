        --color-text-primary: #f1f5f9;
        --color-text-secondary: #cbd5e1;
        --color-text-tertiary: #94a3b8;
        --color-border-primary: #334155;
        --color-border-secondary: #475569;
        --color-border-tertiary: #1e293b;

    .shell {

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 12px;
      color: #5dcaa5;

      height: 8px;

      border-radius: 30px;
      padding: 5px 12px;

      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.2); }
    
    .nav {
      display: flex;
      background: var(--color-background-primary);
      border-bottom: 1px solid var(--color-border-tertiary);

      gap: 6px;
      overflow-x: auto;
    }
    .ntab {
      padding: 11px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: var(--color-text-secondary);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ntab:hover { color: var(--color-text-primary); }
    .ntab.on { color: #1a73e8; border-bottom-color: #1a73e8; }
    .ntab .count {
      font-size: 11px;
      background: var(--color-background-secondary);
      border-radius: 30px;
      padding: 1px 8px;
    }
    .ntab.on .count { background: #e8f0fe; color: #0c447c; }
    
    .content { overflow-y: auto; padding: 20px; }
    .pane { display: none; }
    .pane.on { display: block; }
    
    .kgrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .kcard {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 16px;

    .kcard.accent-amber { border-top: 3px solid #ef9f27; }
    .kcard.accent-red { border-top: 3px solid #e24b4a; }
    .kcard.accent-teal { border-top: 3px solid #1d9e75; }
    .klabel {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--color-text-tertiary);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .kval {
      font-size: 28px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--color-text-primary);
    }

    .ksub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; }
    
    .row2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
    .panel {

      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);

      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--color-text-secondary);

    .legend-row { display: flex; gap: 16px; padding: 0 16px 12px; font-size: 11px; }
    .ld { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 6px; vertical-align: middle; }
    
    .search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--color-border-tertiary); background: var(--color-background-secondary); }

      background: var(--color-background-primary);
      color: var(--color-text-primary);

      font-size: 10px;
      font-weight: 600;

      display: flex;
      align-items: center;
      gap: 8px;

    .einfo { flex: 1; min-width: 0; }
    .en { font-weight: 600; font-size: 13px; }
    .ec { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }

    .sl { font-size: 10px; text-transform: uppercase; color: var(--color-text-tertiary); margin-bottom: 4px; }
    .sv { font-weight: 500; font-size: 13px; }

      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--color-border-tertiary);

    .icost { font-weight: 500; color: #1a73e8; }

      font-size: 12px;
      margin-bottom: 12px;

      justify-content: center;
      align-items: center;
      padding: 40px;
      background: var(--color-background-tertiary);
      border-radius: var(--border-radius-lg);

    .stat-cell { background: var(--color-background-primary); padding: 14px; text-align: center; }
    .progress-bar-wrap { height: 4px; background: var(--color-background-secondary); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress-bar { height: 4px; background: #185fa5; width: 0%; }
  </style>
</head>

  // ========== LÓGICA PRINCIPAL ==========
  let fullData = null;
  let charts = {};
  let refreshInterval = null;

  async function cargarDatos() {
    document.getElementById('mainContent').innerHTML = `<div class="loading-overlay"><div class="spinner"></div><span style="margin-left:12px">Cargando datos desde CSV...</span></div>`;
    try {
      let registroCSV = EMBEDDED_REGISTRO;
      let mantenimientoCSV = EMBEDDED_MANTENIMIENTO;

      if (CSV_REGISTRO_URL && CSV_MANTENIMIENTO_URL) {
        const [regResp, manResp] = await Promise.all([
          fetch(CSV_REGISTRO_URL).then(r => r.text()),
          fetch(CSV_MANTENIMIENTO_URL).then(r => r.text())
        ]);
        registroCSV = regResp;
        mantenimientoCSV = manResp;
      }

      const registros = Papa.parse(registroCSV, { header: true, skipEmptyLines: true }).data;
      const mantenimientos = Papa.parse(mantenimientoCSV, { header: true, skipEmptyLines: true }).data;

      const equiposMap = new Map();

      // Procesar registro de equipos
      for (const row of registros) {
        const codigo = (row['Codigo de equipo'] || '').trim();
        if (!codigo) continue;
        let unidad = (row['Agricola'] || '').trim();
        if (unidad.includes('EDT')) unidad = 'EDT';
        else if (unidad.includes('TDA - EMPAQUE')) unidad = 'TDA - EMPAQUE';
        else if (unidad.includes('MARGESI')) unidad = 'MARGESI';
        else if (unidad.includes('TDB')) unidad = 'TDB';
        else unidad = 'OTROS';

        const tipo = (row['COIRON o Eq Viejo'] || '').trim() === 'COIRON' ? 'COIRON' : 'EQ VIEJO';
        const estado = (row['Estado Actual'] || '').trim();
        const ultFecha = row['Ult fecha de mant'] ? formatearFecha(row['Ult fecha de mant']) : '';

        equiposMap.set(codigo, {
          codigo: codigo,
          sector: (row['Sector'] || '').trim(),
          descripcion: (row['Descripcion'] || '').trim(),
          gas: (row['Gas'] || '').trim(),
          tipo: tipo,
          estado: estado,
          ultFecha: ultFecha,
          observaciones: (row['Observaciones'] || '').trim(),
          unidad: unidad,
          intervenciones: []
        });
      }

      // Procesar mantenimientos
      for (const row of mantenimientos) {
        const codigo = (row['Codigo de equipo'] || '').trim();
        if (!codigo || !equiposMap.has(codigo)) continue;
        const fecha = row['Fecha del mant'] ? formatearFecha(row['Fecha del mant']) : '';
        const estadoTrabajo = (row['Estado del trabajo'] || '').trim();
        let presupuesto = row['Presupuesto USD'] || '';
        if (presupuesto && !isNaN(parseFloat(presupuesto))) presupuesto = `$${parseFloat(presupuesto).toLocaleString()}`;
        equiposMap.get(codigo).intervenciones.push({
          fecha: fecha,
          desc: (row['Descripcion del Mantenimiento'] || '').trim(),
          estado: estadoTrabajo,
          orden: (row['N°: Recep/Orden de compra'] || '').trim(),
          presupuesto: presupuesto,
          obs: (row['Observaciones'] || '').trim()
        });
      }

      // Ordenar intervenciones por fecha descendente
      for (let eq of equiposMap.values()) {
        eq.intervenciones.sort((a,b) => {
          if (!a.fecha) return 1;
          if (!b.fecha) return -1;
          return new Date(b.fecha) - new Date(a.fecha);
        });
        if (!eq.ultFecha && eq.intervenciones.length && eq.intervenciones[0].fecha) {
          eq.ultFecha = eq.intervenciones[0].fecha;
        }
      }

      // Agrupar por unidad
      const DB = { EDT: [], 'TDA - EMPAQUE': [], MARGESI: [], TDB: [] };
      for (let eq of equiposMap.values()) {
        if (DB[eq.unidad]) DB[eq.unidad].push(eq);
        else DB['OTROS'] = DB['OTROS'] || [];
      }

      // Estadísticas
      let totalEquipos = 0, totalOperativos = 0, totalCOIRON = 0, totalViejos = 0, totalPresupuesto = 0;
      const intervencionesPorMes = {};
      const trabajosNoIniciados = [];
      const equiposSinRegistro = [];

      for (let eq of equiposMap.values()) {
        totalEquipos++;
        if (eq.estado === 'Operativa') totalOperativos++;
        if (eq.tipo === 'COIRON') totalCOIRON++;
        else totalViejos++;

        eq.intervenciones.forEach(int => {
          const monto = parseFloat(String(int.presupuesto).replace(/[^0-9.-]/g, ''));
          if (!isNaN(monto) && int.estado === 'Finalizado') totalPresupuesto += monto;

          if (int.fecha) {
            const [d,m,a] = int.fecha.split('/');
            if (a && m) {
              const key = `${a}-${m.padStart(2,'0')}`;
              intervencionesPorMes[key] = (intervencionesPorMes[key] || 0) + 1;
            }
          }
          if (int.estado === 'No iniciado') {
            trabajosNoIniciados.push({ unidad: eq.unidad, sector: eq.sector, codigo: eq.codigo, desc: int.desc });
          }
        });
        if (!eq.ultFecha && eq.intervenciones.length === 0) {
          equiposSinRegistro.push({ unidad: eq.unidad, sector: eq.sector, codigo: eq.codigo, obs: eq.observaciones });
        }
      }

      // Serie de meses (últimos 12)
      const mesesLabels = [];
      const mesesData = [];
      const hoy = new Date();
      for (let i = 11; i >= 0; i--) {
        const fecha = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
        const key = `${fecha.getFullYear()}-${(fecha.getMonth()+1).toString().padStart(2,'0')}`;
        const mesLabel = fecha.toLocaleString('es', { month: 'short', year: '2-digit' }).replace('.','');
        mesesLabels.push(mesLabel);
        mesesData.push(intervencionesPorMes[key] || 0);
      }

      fullData = { DB, stats: { totalEquipos, totalOperativos, totalCOIRON, totalViejos, totalPresupuesto, trabajosNoIniciados, equiposSinRegistro, mesesLabels, mesesData } };
      renderizarTodo();
      document.getElementById('lastUpdate').innerHTML = `Actualizado ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      console.error(err);
      document.getElementById('mainContent').innerHTML = `<div class="empty"><i class="ti ti-alert-triangle"></i> Error cargando datos: ${err.message}<br><button onclick="cargarDatos()" class="refresh-btn" style="margin-top:12px">Reintentar</button></div>`;
    }
  }

  function formatearFecha(fechaStr) {
    if (!fechaStr) return '';
    let partes = fechaStr.split('/');
    if (partes.length === 3) {
      if (partes[0].length === 4) return `${partes[2]}/${partes[1]}/${partes[0]}`;
      return fechaStr;
    }
    return fechaStr;
  }

  function renderizarTodo() {
    if (!fullData) return;
    renderNavTabs();
    renderResumen();
    renderListasPorUnidad();
    setTimeout(() => inicializarGraficos(), 100);
  }

  function renderNavTabs() {
    const nav = document.getElementById('navTabs');
    const unidades = Object.keys(fullData.DB).filter(u => fullData.DB[u].length > 0);
    const tabsHtml = unidades.map((un, idx) => {
      let nombre = un === 'TDA - EMPAQUE' ? 'TDA Empaque' : un;
      const count = fullData.DB[un].length;
      const active = idx === 0 ? 'on' : '';
      return `<div class="ntab ${active}" onclick="showPane('${un.replace(/\s/g, '')}', this)"><i class="ti ti-${un === 'EDT' ? 'building' : (un === 'TDA - EMPAQUE' ? 'building-store' : 'map-pin')}"></i>${nombre} <span class="count">${count}</span></div>`;
    }).join('');
    nav.innerHTML = `<div class="ntab on" onclick="showPane('resumen', this)"><i class="ti ti-chart-bar"></i>Resumen <span class="count">${fullData.stats.totalEquipos}</span></div>${tabsHtml}`;
  }

  function showPane(id, tabElement) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.ntab').forEach(t => t.classList.remove('on'));
    if (id === 'resumen') {
      const pane = document.getElementById('pane-resumen');
      if (pane) pane.classList.add('on');
    } else {
      const pane = document.getElementById(`pane-${id}`);
      if (pane) pane.classList.add('on');
    }
    if (tabElement) tabElement.classList.add('on');
  }

      </div>
      <div class="stat-row">
        ${Object.entries(DB).filter(([k]) => k !== 'OTROS').map(([un, eqs]) => {

  }

  function renderListasPorUnidad() {
    for (const [un, equipos] of Object.entries(fullData.DB)) {
      if (un === 'OTROS') continue;
      const containerId = `list-${un.replace(/\s/g, '')}`;
      const coiron = equipos.filter(e => e.tipo === 'COIRON');
      const viejos = equipos.filter(e => e.tipo !== 'COIRON');
      let html = '';
      if (coiron.length) html += `<div class="sec-hdr"><i class="ti ti-stars"></i>COIRON (${coiron.length})</div>` + coiron.map(eq => eRow(eq, un)).join('');
      if (viejos.length) html += `<div class="sec-hdr"><i class="ti ti-clock-hour-3"></i>Equipos Viejos (${viejos.length})</div>` + viejos.map(eq => eRow(eq, un)).join('');
      const el = document.getElementById(containerId);
      if (el) el.innerHTML = html || '<div class="empty">Sin equipos</div>';

  function eRow(eq, unidad) {
    const dotCls = eq.estado === 'Operativa' ? 'd-ok' : (eq.estado === 'Fuera de servicio' ? 'd-danger' : 'd-none');
    const badgeTipo = eq.tipo === 'COIRON' ? 'b-coiron' : 'b-viejo';
    const badgeEstado = eq.estado === 'Operativa' ? 'b-ok' : (eq.estado === 'Fuera de servicio' ? 'b-danger' : 'b-none');
    return `<div class="erow" onclick="openModal('${unidad}', '${eq.codigo}')">
      <div class="estatus"><div class="dot ${dotCls}"></div></div>
      <div class="einfo"><div class="en">${escapeHtml(eq.sector)}</div><div class="ec">${eq.codigo}</div><div class="ed">${escapeHtml(eq.descripcion)}</div></div>
      <div class="emeta"><span class="badge ${badgeTipo}">${eq.tipo}</span><span class="badge ${badgeEstado}">${eq.estado}</span><span class="etime">${eq.ultFecha || '—'}</span></div>
    </div>`;
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  window.openModal = function(unidad, codigo) {
    const eq = fullData.DB[unidad].find(e => e.codigo === codigo);
    if (!eq) return;
    const presups = eq.intervenciones.filter(i => i.presupuesto && i.presupuesto !== '$0').map(i => i.presupuesto);
    const intHTML = eq.intervenciones.length ? eq.intervenciones.map(i => `<div class="int-row"><div class="idate"><div class="idl">${i.fecha || 'Pendiente'}</div><div><span class="badge ${i.estado === 'Finalizado' ? 'b-ok' : (i.estado === 'No iniciado' ? 'b-warn' : 'b-proc')}">${i.estado}</span></div></div><div class="idesc">${escapeHtml(i.desc)}${i.obs ? `<div style="margin-top:4px;font-size:10px;">Obs: ${escapeHtml(i.obs)}</div>` : ''}${i.orden ? `<div style="font-size:10px;">Orden: ${i.orden}</div>` : ''}</div><div class="icost">${i.presupuesto || '—'}</div></div>`).join('') : '<div class="empty">Sin intervenciones registradas</div>';

      <div class="mhero"><button class="mclose" onclick="closeModal()">✕ Cerrar</button><div class="mtype">${unidad} · ${eq.tipo}</div><div class="mname">${escapeHtml(eq.sector)}</div><div class="mcode">${eq.codigo}</div></div>

      <div class="section-lbl">Descripción técnica</div><div class="obs-box">${escapeHtml(eq.descripcion)}</div>${eq.observaciones ? `<div class="section-lbl">Observaciones actuales</div><div class="obs-box obs-alert">${escapeHtml(eq.observaciones)}</div>` : ''}

    document.getElementById('modalBg').classList.add('open');
  };
  window.closeModal = function(e) { if (!e || e.target === document.getElementById('modalBg')) document.getElementById('modalBg').classList.remove('open'); };
  window.filtrarUnidad = function(unidad, term) {
    const equipos = fullData.DB[unidad] || [];
    const filtrados = term ? equipos.filter(e => [e.sector, e.codigo, e.descripcion].join(' ').toLowerCase().includes(term.toLowerCase())) : equipos;
    const coiron = filtrados.filter(e => e.tipo === 'COIRON');
    const viejos = filtrados.filter(e => e.tipo !== 'COIRON');
    let html = '';
    if (coiron.length) html += `<div class="sec-hdr"><i class="ti ti-stars"></i>COIRON (${coiron.length})</div>` + coiron.map(eq => eRow(eq, unidad)).join('');
    if (viejos.length) html += `<div class="sec-hdr"><i class="ti ti-clock-hour-3"></i>Equipos Viejos (${viejos.length})</div>` + viejos.map(eq => eRow(eq, unidad)).join('');
    document.getElementById(`list-${unidad.replace(/\s/g, '')}`).innerHTML = html || '<div class="empty">Sin resultados</div>';
  };

  function inicializarGraficos() {
    if (charts.cMeses) charts.cMeses.destroy();
    if (charts.cEstado) charts.cEstado.destroy();
    if (charts.cUnidad) charts.cUnidad.destroy();
    if (charts.cPresup) charts.cPresup.destroy();
    const stats = fullData.stats;
    const ctxM = document.getElementById('cMeses')?.getContext('2d');
    if (ctxM) charts.cMeses = new Chart(ctxM, { type: 'bar', data: { labels: stats.mesesLabels, datasets: [{ label: 'Intervenciones', data: stats.mesesData, backgroundColor: '#378ADD', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } } });
    const ctxE = document.getElementById('cEstado')?.getContext('2d');
    if (ctxE) charts.cEstado = new Chart(ctxE, { type: 'doughnut', data: { labels: ['Operativa', 'Fuera de servicio'], datasets: [{ data: [stats.totalOperativos, stats.totalEquipos - stats.totalOperativos], backgroundColor: ['#639922', '#E24B4A'], borderWidth: 0 }] }, options: { cutout: '65%', plugins: { legend: { display: false } } } });
    const ctxU = document.getElementById('cUnidad')?.getContext('2d');
    if (ctxU) {
      const labels = [], coironData = [], viejoData = [];
      for (const [un, eqs] of Object.entries(fullData.DB)) { if (un !== 'OTROS') { labels.push(un === 'TDA - EMPAQUE' ? 'TDA' : un); coironData.push(eqs.filter(e => e.tipo === 'COIRON').length); viejoData.push(eqs.filter(e => e.tipo !== 'COIRON').length); } }
      charts.cUnidad = new Chart(ctxU, { type: 'bar', data: { labels, datasets: [{ label: 'COIRON', data: coironData, backgroundColor: '#185FA5' }, { label: 'Viejos', data: viejoData, backgroundColor: '#EF9F27' }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
    }
    const ctxP = document.getElementById('cPresup')?.getContext('2d');
    if (ctxP) {
      const intervencionesConCosto = [];
      for (const eq of Object.values(fullData.DB).flat()) {
        eq.intervenciones.forEach(int => { if (int.presupuesto && int.presupuesto !== '$0') { const val = parseFloat(String(int.presupuesto).replace(/[^0-9.-]/g, '')); if (!isNaN(val)) intervencionesConCosto.push({ label: eq.codigo.slice(0,12), value: val }); } });
      }
      const top = intervencionesConCosto.slice(0, 8);
      charts.cPresup = new Chart(ctxP, { type: 'bar', data: { labels: top.map(t => t.label), datasets: [{ label: 'USD', data: top.map(t => t.value), backgroundColor: '#1D9E75' }] }, options: { plugins: { tooltip: { callbacks: { label: c => `$${c.raw} USD` } } } } });
    }
  }

  document.getElementById('refreshBtn')?.addEventListener('click', () => cargarDatos());
  cargarDatos();
  if (refreshInterval) clearInterval(refreshInterval);
  refreshInterval = setInterval(() => cargarDatos(), 60000);
</script>
</body>
</html>
